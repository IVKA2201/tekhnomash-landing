version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: wp-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass        
      MYSQL_DATABASE: wordpress            
      MYSQL_USER: wpuser                   
      MYSQL_PASSWORD: Новый_надёжный_пароль
    volumes:
      - db_data:/var/lib/mysql
      - ./backup.sql:/docker-entrypoint-initdb.d/backup.sql   # автоимпорт
    ports:
      - "3307:3306"   # опционально, чтобы подключаться к БД с хоста

  wordpress:
    image: wordpress:latest
    container_name: wp-app
    restart: always
    depends_on:
      - db
    ports:
      - "8080:80"     # сайт будет доступен по http://localhost:8080
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: Новый_надёжный_пароль
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - ./:/var/www/html   # монтируем все файлы сайта

volumes:
  db_data: